name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Vite 8 / oxlint / @vitejs/plugin-react all require Node ^20.19.0 || >=22.12.0 —
  # Node 18 silently drops their optional native bindings and breaks lint/build.
  NODE_VERSION: '22'

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        run: npm run build

      - name: npm audit (dependency vulnerabilities)
        run: npm audit --audit-level=high

  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run e2e tests (${{ matrix.browser }})
        run: npx playwright test --config=e2e-tests/playwright.config.ts --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy to staging
        run: echo "Deploying frontend to staging (placeholder — no real infra target)."

  deploy-production:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy to green environment
        run: echo "Deploying frontend to green slot (placeholder — no real infra target)."

      - name: Health check green
        run: echo "Polling https://green.example.com (placeholder)."

      - name: Switch traffic to green
        run: echo "Switching CDN/load balancer to green (placeholder)."

      - name: Rollback on failure
        if: failure()
        run: echo "Rolling back to blue environment (placeholder)."

      - name: Notify team
        if: always()
        continue-on-error: true
        run: echo "Would notify Slack via ${{ secrets.SLACK_WEBHOOK != '' && 'configured webhook' || 'no webhook configured — skipping' }}"
